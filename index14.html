<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO Health: 穩定優化版</title>
    <style>
        :root {
            --pico-bg: #f5f5f5;
            --pico-dark: #333;
            --pico-hero: #4ea5ff;
            --pico-door: #2ecc71;
            --pico-hp: #ff4757;
        }

        body {
            font-family: '微軟正黑體', sans-serif;
            background-color: var(--pico-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .start-btn {
            background: var(--pico-hero);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }

        #ui-top {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 800px;
            padding: 10px 20px;
            font-weight: bold;
            box-sizing: border-box;
            font-size: 18px;
        }

        #question-box {
            background: var(--pico-dark);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            width: 90%;
            max-width: 780px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 10px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        canvas {
            background-color: white;
            border: 4px solid var(--pico-dark);
            border-radius: 8px;
            width: 100%;
            height: auto;
            display: block;
        }

        #mobile-controls {
            display: none;
            width: 100%;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            position: fixed;
            bottom: 20px;
            left: 0;
        }

        .control-btn {
            width: 70px; height: 70px;
            background: rgba(0, 0, 0, 0.15);
            border: 3px solid var(--pico-dark);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
        }

        @media (max-width: 850px) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h2>🏥 PICO 健康大冒險</h2>
    <div style="max-width: 80%; text-align: left; line-height: 1.6;">
        <p>1. 使用左右鍵移動，上鍵跳躍。</p>
        <p>2. 觸碰金幣回答問題，答對才能開啟出口。</p>
        <p>3. <b>注意：</b>天花板很硬，你無法跳回上一層！</p>
        <p>4. 避開紅色尖刺，掉出螢幕會扣血。</p>
    </div>
    <button class="start-btn" onclick="startGame()">開始遊戲</button>
</div>

<div id="ui-top">
    <div id="status-hp">HP: ❤️❤️❤️</div>
    <div id="status-score">SCORE: 0</div>
</div>

<div id="question-box">準備挑戰 20 題健康知識！</div>

<div id="game-wrapper">
    <canvas id="game-canvas" width="800" height="520"></canvas>
    <div id="mobile-controls">
        <div style="display:flex; gap:10px;">
            <div class="control-btn" id="btn-left">⬅️</div>
            <div class="control-btn" id="btn-right">➡️</div>
        </div>
        <div class="control-btn" id="btn-jump">⬆️</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');

    let quizBank = [
        { q: "成人每日建議飲水量是體重(kg)乘以多少？", options: ["10ml", "20ml", "30-35ml", "100ml"], correct: 2 },
        { q: "下列哪種運動最能增進心肺功能？", options: ["看電視", "慢跑", "睡覺", "滑手機"], correct: 1 },
        { q: "洗手「內外夾弓大立腕」，最後動作是？", options: ["指尖", "手背", "手心", "手腕"], correct: 3 },
        { q: "預防近視，用眼30分鐘應休息多久？", options: ["1分鐘", "10分鐘", "30分鐘", "不必"], correct: 1 },
        { q: "正確刷牙法「貝氏刷牙法」，刷毛與牙齒夾角？", options: ["15度", "45度", "90度", "180度"], correct: 1 },
        { q: "下列哪種食物含有豐富的維生素C？", options: ["白米飯", "芭樂", "炸雞", "可樂"], correct: 1 },
        { q: "心情不好時，哪種做法比較健康？", options: ["一直吃甜食", "找人傾訴", "悶在心裡", "亂發脾氣"], correct: 1 },
        { q: "預防骨質疏鬆，應該多補充哪種營養素？", options: ["蛋白質", "鈣質", "脂肪", "糖分"], correct: 1 },
        { q: "二手菸對身體有害嗎？", options: ["沒影響", "比一手菸毒", "只有味道臭", "會變聰明"], correct: 1 },
        { q: "正常的睡眠時間，成人建議每天睡幾小時？", options: ["3小時", "7-9小時", "15小時", "不用睡"], correct: 1 },
        { q: "吃太鹹容易引發哪種疾病？", options: ["高血壓", "近視", "香港腳", "感冒"], correct: 0 },
        { q: "所謂「天天五蔬果」是指？", options: ["5顆蘋果", "3份蔬菜2份水果", "5杯果汁", "只吃水果"], correct: 1 },
        { q: "哪種行為最容易傳播流感？", options: ["打噴嚏不遮口鼻", "常洗手", "戴口罩", "均衡飲食"], correct: 0 },
        { q: "BMI 指數是用來測量什麼？", options: ["智力", "體重是否標準", "視力", "聽力"], correct: 1 },
        { q: "哪種飲料最健康？", options: ["珍珠奶茶", "純水", "能量飲", "碳酸飲料"], correct: 1 },
        { q: "預防腸病毒最有效的方法？", options: ["不睡覺", "勤洗手", "多看書", "穿厚衣服"], correct: 1 },
        { q: "中暑時應該優先做什麼？", options: ["跑步", "移至陰涼處", "穿大衣", "喝熱咖啡"], correct: 1 },
        { q: "哪種維生素跟眼睛健康最相關？", options: ["維生素A", "維生素B12", "維生素E", "維生素K"], correct: 0 },
        { q: "如厕後哪項行為最重要？", options: ["洗手", "梳頭", "照鏡子", "唱歌"], correct: 0 },
        { q: "均衡飲食中，哪類食物應吃最多？", options: ["油脂類", "全穀雜糧類", "糖果類", "炸雞類"], correct: 1 }
    ];

    let currentLevel = 0;
    let score = 0;
    let hp = 3;
    let doorOpen = false;
    let gameStarted = false;
    let animationId = null; // 用於控制循環，防止重複執行
    let platforms = [];
    let coins = [];
    let spikes = [];

    const player = {
        x: 50, y: 50, vx: 0, vy: 0, size: 26,
        onGround: false, 
        speed: 4.5,
        jumpPower: -11.5,
        gravity: 0.6
    };

    const keys = {};

    function startGame() {
        if (gameStarted) return; // 防止重複點擊開始
        
        document.getElementById('start-screen').style.display = 'none';
        quizBank.sort(() => Math.random() - 0.5);
        gameStarted = true;
        initLevel();
        
        // 確保循環只啟動一次
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function generateMap() {
        platforms = [
            { x: 0, y: 130, w: 350, h: 15 },
            { x: 120, y: 280, w: 560, h: 15 },
            { x: 0, y: 430, w: 800, h: 20 }
        ];
        coins = []; 
        spikes = [];

        for (let i = 0; i < 2; i++) {
            const p = platforms[Math.floor(Math.random() * 2) + 1];
            spikes.push({ x: p.x + 150 + Math.random() * (p.w - 300), y: p.y - 15, w: 24, h: 15 });
        }

        const data = quizBank[currentLevel];
        data.options.forEach((opt, i) => {
            let valid = false; let cx, cy;
            let attempts = 0; // 防止無窮迴圈
            while(!valid && attempts < 50) {
                attempts++;
                const p = platforms[Math.floor(Math.random() * 3)];
                cx = p.x + 40 + Math.random() * (p.w - 80);
                cy = p.y - 45;
                
                const nearDoor = (cx > 650 && cy > 350);
                const nearSpike = spikes.some(s => Math.abs(s.x - cx) < 80);
                const nearCoin = coins.some(c => Math.abs(c.x - cx) < 120);
                
                if (!nearSpike && !nearCoin && !nearDoor) valid = true;
            }
            coins.push({ x: cx, y: cy, text: opt, isCorrect: i === data.correct, collected: false });
        });

        player.x = 50; player.y = 50;
        player.vx = 0; player.vy = 0;
    }

    function initLevel() {
        doorOpen = false;
        if (currentLevel > 0 && currentLevel % 5 === 0 && hp < 3) hp++;
        generateMap();
        updateUI();
    }

    function updateUI() {
        const box = document.getElementById('question-box');
        box.innerText = `第 ${currentLevel + 1}/20 題：${quizBank[currentLevel].q}`;
        box.style.backgroundColor = "#333";
        document.getElementById('status-hp').innerText = "HP: " + "❤️".repeat(hp);
        document.getElementById('status-score').innerText = "SCORE: " + score;
    }

    function loseHp() {
        hp--;
        if (hp <= 0) {
            gameStarted = false;
            cancelAnimationFrame(animationId);
            alert("遊戲結束！最終得分: " + score);
            location.reload();
        } else {
            updateUI();
            player.x = 50; player.y = 50;
            player.vx = 0; player.vy = 0;
        }
    }

    window.addEventListener('keydown', e => { if(gameStarted) keys[e.code] = true; });
    window.addEventListener('keyup', e => { if(gameStarted) keys[e.code] = false; });

    const btnMap = { 'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-jump': 'ArrowUp' };
    Object.keys(btnMap).forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); if(gameStarted) keys[btnMap[id]] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); if(gameStarted) keys[btnMap[id]] = false; });
    });

    function update() {
        if (!gameStarted) return;

        if (keys['ArrowLeft']) player.vx = -player.speed;
        else if (keys['ArrowRight']) player.vx = player.speed;
        else player.vx *= 0.7;

        if (keys['ArrowUp'] && player.onGround) {
            player.vy = player.jumpPower;
            player.onGround = false;
        }

        player.vy += player.gravity;
        player.x += player.vx;
        player.y += player.vy;
        player.onGround = false;

        platforms.forEach(p => {
            if (player.x + player.size > p.x && player.x < p.x + p.w &&
                player.y + player.size > p.y && player.y + player.size < p.y + p.h + 10 && player.vy >= 0) {
                player.y = p.y - player.size; player.vy = 0; player.onGround = true;
            }
            if (player.x + player.size > p.x && player.x < p.x + p.w &&
                player.y < p.y + p.h && player.y > p.y && player.vy < 0) {
                player.y = p.y + p.h; player.vy = 0;
            }
        });

        spikes.forEach(s => {
            if (player.x + player.size > s.x + 5 && player.x < s.x + s.w - 5 &&
                player.y + player.size > s.y + 5 && player.y < s.y + s.h) loseHp();
        });

        coins.forEach(c => {
            if (!c.collected && Math.abs(player.x - c.x) < 40 && Math.abs(player.y - c.y) < 50) {
                c.collected = true;
                if (c.isCorrect) {
                    doorOpen = true; score += 100;
                    document.getElementById('question-box').innerText = "正確！快去右下角傳送門！";
                    document.getElementById('question-box').style.backgroundColor = "#2ecc71";
                } else { 
                    score = Math.max(0, score - 20); loseHp(); 
                }
            }
        });

        if (player.y > 520) loseHp();
        if (player.x < 0) player.x = 0;
        if (player.x > 800 - player.size) player.x = 800 - player.size;

        if (doorOpen && player.x > 710 && player.y > 360) {
            currentLevel++;
            if (currentLevel < quizBank.length) {
                initLevel();
            } else {
                gameStarted = false;
                cancelAnimationFrame(animationId);
                alert("恭喜完成 20 題挑戰！\n總分: " + score);
                location.reload();
            }
        }
    }

    function draw() {
        if (!gameStarted) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#444";
        platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));
        
        ctx.fillStyle = "#e74c3c";
        spikes.forEach(s => {
            ctx.beginPath(); ctx.moveTo(s.x, s.y + s.h); 
            ctx.lineTo(s.x + s.w / 2, s.y); ctx.lineTo(s.x + s.w, s.y + s.h); ctx.fill();
        });

        coins.forEach(c => {
            if (!c.collected) {
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(c.x+15, c.y+15, 14, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "#333"; ctx.font = "bold 15px Arial"; ctx.textAlign = "center";
                ctx.fillText(c.text, c.x + 15, c.y - 12);
            }
        });

        if (doorOpen) {
            ctx.fillStyle = (Date.now() % 600 > 300) ? "#2ecc71" : "#27ae60";
            ctx.fillRect(720, 370, 50, 60);
        } else {
            ctx.fillStyle = "#ddd"; ctx.fillRect(720, 370, 50, 60);
        }

        ctx.fillStyle = "#4ea5ff";
        ctx.fillRect(player.x, player.y, player.size, player.size);
    }

    function gameLoop() {
        if (!gameStarted) return;
        update();
        draw();
        animationId = requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
